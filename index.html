<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishna AI Guide</title>

<script src="https://js.puter.com/v2/"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

header {
    padding: 15px;
    text-align: center;
    background: #111;
    font-size: 18px;
    font-weight: bold;
}

#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    margin: 10px;
    padding: 12px;
    border-radius: 10px;
    max-width: 75%;
}

.user { background: #007bff; margin-left: auto; }
.bot { background: #222; }

#inputArea {
    display: flex;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    background: #111;
    color: white;
}

button {
    padding: 12px;
    border: none;
    background: green;
    color: white;
    cursor: pointer;
}

#voiceBtn {
    background: orange;
}
</style>
</head>

<body>

<header>🧘 Krishna AI (Understanding Mode + Voice)</header>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="तपाईंको समस्या लेख्नुहोस्...">
<button onclick="send()">Send</button>
<button id="voiceBtn" onclick="toggleVoice()">🎙️ Voice OFF</button>
</div>

<script>
let voiceEnabled = false;

// 🎙️ Voice toggle
function toggleVoice(){
    voiceEnabled = !voiceEnabled;
    document.getElementById("voiceBtn").innerText = voiceEnabled ? "🎙️ Voice ON" : "🎙️ Voice OFF";
}

// 🔊 Speak
function speak(text){
    if(!voiceEnabled) return;

    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "ne-NP";
    speech.rate = 0.9;
    speech.pitch = 0.9;
    speechSynthesis.speak(speech);
}

// UI
function add(text, cls){
    let div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

// 🧠 Advanced Understanding using AI
async function understandUser(text){
    let ai = await puter.ai.chat(`
तिमी एक गहिरो बुद्धिमान गुरु हौ, भगवान कृष्ण जस्तै।

User को समस्या:
"${text}"

काम:
- समस्या बुझ
- उसले कस्तो भावनामा छ (fear, stress, confusion, depression, anger, motivation)
- त्यस अनुसार जीवन मार्गदर्शन देऊ

नियम:
- सधैं नेपालीमा उत्तर देऊ
- गहिरो, शान्त, प्रेरणादायक तरिकाले बोल
- कृष्णको शिक्षाजस्तै जीवन ज्ञान देऊ

Output format:
emotion: ...
guidance: ...
`);
    
    return await ai.text();
}

// 🧘 Generate Final Krishna Response
async function getKrishnaResponse(text){

    let analysis = await understandUser(text);

    // Extract emotion
    let emotionMatch = analysis.match(/emotion:\s*(\w+)/);
    let emotion = emotionMatch ? emotionMatch[1] : "general";

    // Guidance extract
    let guidance = analysis.split("guidance:")[1] || "शान्त रह र आफ्नो कर्तव्यमा ध्यान देऊ।";

    // Simple Gita-inspired message
    let final = `🧘 अवस्था: ${emotion}

📖 मार्गदर्शन:
${guidance}

🔱 कृष्णको सन्देश:
तिमी आफ्नो कर्ममा ध्यान देऊ। परिणामको चिन्ता नगर।`;

    return final;
}

// 🚀 MAIN SEND FUNCTION
async function send(){
    let input = document.getElementById("input");
    let text = input.value.trim();
    if(!text) return;

    add(text, "user");
    input.value = "";

    add("सोच्दै छु...", "bot");

    try {
        let response = await getKrishnaResponse(text);

        document.querySelector(".bot:last-child").remove();
        add(response, "bot");
        speak(response);

    } catch(err){
        document.querySelector(".bot:last-child").remove();
        add("त्रुटि आयो। कृपया फेरि प्रयास गर्नुहोस्।", "bot");
        console.log(err);
    }
}
</script>

</body>
</html>
