<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Gita AI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0d0d0d;
    color: white;
}
header {
    padding: 15px;
    text-align: center;
    background: #111;
    font-weight: bold;
}
#chat {
    height: 75vh;
    overflow-y: auto;
    padding: 10px;
}
.msg {
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
}
.user {
    background: #007bff;
    margin-left: auto;
}
.bot {
    background: #222;
}
#inputArea {
    display: flex;
}
input {
    flex: 1;
    padding: 12px;
    border: none;
    background: #111;
    color: white;
}
button {
    padding: 12px;
    background: green;
    color: white;
    border: none;
}
</style>
</head>

<body>

<header>🧘 Offline Gita Guide (Nepali)</header>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="प्रश्न लेख्नुहोस्...">
<button onclick="send()">Send</button>
</div>

<script src="gita.js"></script>

<script>

function add(text, cls){
    let div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

function findAnswer(q){
    q = q.toLowerCase();

    for(let g of GITA){
        for(let k of g.keywords){
            if(q.includes(k)){
                return `📖 अध्याय ${g.chapter}, श्लोक ${g.verse}

${g.sanskrit}

👉 ${g.meaning_np}

🧘 मार्गदर्शन:
जीवनमा आफ्नो कर्तव्यमा ध्यान देऊ र परिणामको चिन्ता नगर।`;
            }
        }
    }

    return "🧘 शान्त रहनुहोस्। आफ्नो मनलाई नियन्त्रण गर्नुहोस्। जीवनमा धैर्य र अनुशासन आवश्यक छ।";
}

function send(){
    let input = document.getElementById("input");
    let text = input.value.trim();
    if(!text) return;

    add(text, "user");
    input.value = "";

    let reply = findAnswer(text);

    setTimeout(()=>{
        add(reply, "bot");
    }, 500);
}

</script>

</body>
</html>
