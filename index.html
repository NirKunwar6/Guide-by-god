<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishna AI (Puter + Voice)</title>

<script src="https://js.puter.com/v2/"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0d0d0d;
    color: white;
}
header {
    padding: 15px;
    text-align: center;
    background: #111;
    font-weight: bold;
}
#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 10px;
}
.msg {
    margin: 10px;
    padding: 12px;
    border-radius: 10px;
    max-width: 75%;
}
.user { background: #007bff; margin-left: auto; }
.bot { background: #222; }

#controls {
    display: flex;
}
input {
    flex: 1;
    padding: 12px;
    border: none;
    background: #111;
    color: white;
}
button {
    padding: 12px;
    border: none;
    background: green;
    color: white;
    cursor: pointer;
}
#voiceBtn {
    background: orange;
}
</style>
</head>

<body>

<header>🧘 Krishna AI Guide (Deep + Voice)</header>

<div id="chat"></div>

<div id="controls">
<input id="input" placeholder="तपाईंको समस्या लेख्नुहोस्...">
<button onclick="send()">Send</button>
<button id="voiceBtn" onclick="toggleVoice()">🎙️ Voice OFF</button>
</div>

<script>
// 🎙️ Voice toggle
let voiceEnabled = false;

function toggleVoice(){
    voiceEnabled = !voiceEnabled;
    document.getElementById("voiceBtn").innerText = voiceEnabled ? "🎙️ Voice ON" : "🎙️ Voice OFF";
}

// 🔊 Speak
function speak(text){
    if(!voiceEnabled) return;

    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "ne-NP";
    speech.rate = 0.9;
    speech.pitch = 1;
    speechSynthesis.speak(speech);
}

// UI
function add(text, cls){
    let div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

// 📖 Mini Gita DB (expand later)
const GITA = [
{chapter:2, verse:47, text:"कर्मण्येवाधिकारस्ते...", meaning:"कर्म गर, फलको चिन्ता नगर", theme:"duty"},
{chapter:2, verse:14, text:"सुख-दुःख अस्थायी हुन्", meaning:"धैर्य राख", theme:"emotion"},
{chapter:6, verse:5, text:"आफूलाई उठाऊ", meaning:"आत्म-नियन्त्रण गर", theme:"self"},
{chapter:18, verse:66, text:"शरणमा आऊ", meaning:"डर त्याग", theme:"fear"}
];

// 🎯 Find best shloka
function findShloka(theme){
    let list = GITA.filter(x => x.theme === theme);
    return list.length ? list[Math.floor(Math.random()*list.length)] : GITA[0];
}

// 🚀 MAIN AI
async function send(){
    let input = document.getElementById("input");
    let text = input.value.trim();
    if(!text) return;

    add(text, "user");
    input.value = "";

    add("सोच्दै छु...", "bot");

    // Simple local logic (always works)
    let theme = "duty";

    if(text.includes("दुःख") || text.includes("sad")) theme = "emotion";
    if(text.includes("डर") || text.includes("fear")) theme = "fear";
    if(text.includes("अल्छी") || text.includes("lazy")) theme = "self";

    let shloka = findShloka(theme);

    let response = `📖 अध्याय ${shloka.chapter}, श्लोक ${shloka.verse}

${shloka.text}

👉 ${shloka.meaning}

🧘 मार्गदर्शन:
तिमीले आफ्नो कर्तव्यमा ध्यान दिनुपर्छ। डर र दुःख अस्थायी हुन्।`;

    document.querySelector(".bot:last-child").remove();
    add(response, "bot");
    speak(response);
}
</script>

</body>
</html>
