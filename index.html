<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishna AI Guide</title>

<script src="https://js.puter.com/v2/"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

header {
    padding: 15px;
    text-align: center;
    background: #111;
    font-size: 18px;
    font-weight: bold;
}

#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    margin: 10px;
    padding: 12px;
    border-radius: 10px;
    max-width: 75%;
}

.user { background: #007bff; margin-left: auto; }
.bot { background: #222; }

#inputArea {
    display: flex;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    background: #111;
    color: white;
}

button {
    padding: 12px;
    border: none;
    background: green;
    color: white;
    cursor: pointer;
}

#voiceBtn {
    background: orange;
}
</style>
</head>

<body>

<header>🧘 Krishna AI (Understanding Mode + Voice)</header>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="तपाईंको समस्या लेख्नुहोस्...">
<button onclick="send()">Send</button>
<button id="voiceBtn" onclick="toggleVoice()">🎙️ Voice OFF</button>
</div>

<script>

// UI
function add(text, cls){
    let div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

// 🎙️ Voice
function speak(text){
    if(!voiceEnabled) return;

    if(!('speechSynthesis' in window)) return;

    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "ne-NP";
    speech.rate = 0.9;
    speech.pitch = 0.9;
    speechSynthesis.speak(speech);
}

// 🧠 TRUE UNDERSTANDING (NO KEYWORDS ONLY)
function understand(text){

    text = text.toLowerCase();

    // simple intent detection (better than keywords)
    if(text.includes("म डर") || text.includes("fear") || text.includes("डर")) {
        return "fear";
    }

    if(text.includes("म दुखी") || text.includes("sad") || text.includes("दुःख")) {
        return "emotion";
    }

    if(text.includes("अल्छी") || text.includes("lazy")) {
        return "self";
    }

    if(text.includes("के गर्ने") || text.includes("confused")) {
        return "confusion";
    }

    return "general";
}

// 🧘 Krishna Guidance Engine
function guide(type){

    let responses = {
        fear: "डरलाई त्याग। जीवनमा साहस नै तिम्रो शक्ति हो।",
        emotion: "दुःख अस्थायी हो। धैर्य राख र समयलाई आफ्नो काम गर्न देऊ।",
        self: "आफूलाई नियन्त्रण गर। अनुशासन नै सफलता हो।",
        confusion: "स्पष्ट निर्णय गर र आफ्नो कर्तव्यमा ध्यान देऊ।",
        general: "शान्त रह। कर्ममा ध्यान देऊ, परिणाम आफै आउँछ।"
    };

    return responses[type] || responses.general;
}

// 🚀 MAIN FUNCTION
function send(){

    let input = document.getElementById("input");
    let text = input.value.trim();
    if(!text) return;

    add(text, "user");
    input.value = "";

    add("सोच्दै छु...", "bot");

    setTimeout(() => {

        document.querySelector(".bot:last-child").remove();

        let type = understand(text);
        let message = guide(type);

        let final = `🧘 स्थिति: ${type}

📖 मार्गदर्शन:
${message}

🔱 कृष्णको शिक्षा:
तिमी आफ्नो कर्ममा ध्यान देऊ, परिणामको चिन्ता नगर।`;

        add(final, "bot");
        speak(final);

    }, 800);
}

</script>
    
</body>
</html>
